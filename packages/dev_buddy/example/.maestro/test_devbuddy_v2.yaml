appId: com.devbuddy.devBuddyExample
---

# ShopBuddy E2E Demo — DevBuddy diagnostics on a real e-commerce app

- launchApp
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "ShopBuddy"
    timeout: 15000

# === PRODUCT LIST ===
- assertVisible: "ShopBuddy"
- takeScreenshot: demo_01_shop
- scroll
- takeScreenshot: demo_02_scrolled

# === TAP PRODUCT ===
- scrollUntilVisible:
    element: "Wireless Headphones.*"
    direction: UP
- tapOn: "Wireless Headphones.*"
- waitForAnimationToEnd
- takeScreenshot: demo_03_detail
- tapOn: "Add to Cart"
- waitForAnimationToEnd
- back
- waitForAnimationToEnd

# === CART TAB ===
- tapOn: "Cart"
- waitForAnimationToEnd
- takeScreenshot: demo_04_cart

# === INSPECTOR TAB ===
- tapOn: "Inspector"
- waitForAnimationToEnd
- takeScreenshot: demo_05_inspector
- tapOn: "Snapshot"
- waitForAnimationToEnd
- takeScreenshot: demo_06_snapshot

# === DEVBUDDY PANEL ===
- tapOn: "Shop"
- waitForAnimationToEnd
- tapOn: ".*FPS.*"
- waitForAnimationToEnd
- takeScreenshot: demo_07_panel
